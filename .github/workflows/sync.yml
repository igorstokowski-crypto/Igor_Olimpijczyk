name: Health Sync

on:
  schedule:
    - cron: '0 6,9,12,15,18,20 * * *'   # co 3h od 8:00 do 22:00 (UTC+2)
  workflow_dispatch:        # ręczne odpalenie z GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Zainstaluj zależności
        run: pip install -r requirements.txt

      - name: Przywróć sesję Garmin
        run: |
          printf '%s' '${{ secrets.GARTH_SESSION }}' | base64 -d | tar -xz
          echo "=== Pliki w SESJA_GARTH ==="
          ls -la SESJA_GARTH/ || echo "BRAK folderu SESJA_GARTH"

      - name: Utwórz .env
        run: |
          cat <<EOF > .env
          GARMIN_EMAIL=${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD=${{ secrets.GARMIN_PASSWORD }}
          GARMIN_DISPLAY_NAME=${{ secrets.GARMIN_DISPLAY_NAME }}
          FITATU_EMAIL=${{ secrets.FITATU_EMAIL }}
          FITATU_PASSWORD=${{ secrets.FITATU_PASSWORD }}
          HEVY_API_KEY=${{ secrets.HEVY_API_KEY }}
          SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS=credentials.json
          EOF

      - name: Utwórz credentials Google
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Uruchom sync
        run: python sync.py

      - name: Zaktualizuj sesję Garmin (jeśli odświeżona)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -d "SESJA_GARTH" ] && [ "$(ls -A SESJA_GARTH 2>/dev/null)" ]; then
            NEW_SESSION=$(tar -czf - SESJA_GARTH/ | base64 -w 0)
            gh secret set GARTH_SESSION --body "$NEW_SESSION" --repo "${{ github.repository }}"
            echo "✅ Sesja Garmin zaktualizowana w GitHub Secrets"
          else
            echo "⚠️ Brak plików w SESJA_GARTH — sesja nie zaktualizowana"
          fi
